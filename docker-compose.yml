services:
  menu-db:
    image: mongo:7.0
    container_name: menu-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: dev
      MONGO_INITDB_ROOT_PASSWORD: dev
      MONGO_INITDB_DATABASE: menu_db
    ports:
      - "27018:27017"
    volumes:
      - menu-data:/data/db
  user-db:
    image: mongo:7.0
    container_name: user-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: dev
      MONGO_INITDB_ROOT_PASSWORD: dev
      MONGO_INITDB_DATABASE: user_db
    ports:
      - "27019:27017"
    volumes:
      - user-data:/data/db
  auth-db:
    image: mysql:8.0
    container_name: auth-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev
      MYSQL_DATABASE: auth_db
    ports:
      - "3307:3306"
    volumes:
      - auth-data:/var/lib/mysql
  order-db:
    image: mysql:8.0
    container_name: order-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev
      MYSQL_DATABASE: order_db
    ports:
      - "3308:3306"
    volumes:
      - order-data:/var/lib/mysql

volumes:
  menu-data:
  user-data:
  auth-data:
  order-data:
