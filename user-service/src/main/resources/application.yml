spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://localhost:5432/user_db
    username: user
    password: pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081

logging:
  level:
    org.springframework.security: INFO
