server:
  port: 8181

spring:
  application:
    name: identity-service
  data:
    mongodb:
      uri: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@localhost:27019/user_db?authSource=admin
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

logging:
  level:
    com.restaurantos.identityservice: DEBUG
    org.springframework.security: DEBUG
    com.restaurantos.coresecurity: DEBUG

app:
  security:
    jwt:
      issuer: restaurant-os
      private-key: .env/dev/keys/app_private.pem
      public-key: .env/dev/keys/app_public.pem
      cookie:
        secure: false
        same-site: Lax
    system-client:
      client-id: elastic-sync-service
      client-secret: ${SYSTEM_CLIENT_SECRET}
      roles: SYSTEM
      audience: PARTNER
